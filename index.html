<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Proxy</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    h1 { text-align: center; }
    input, button { display: block; width: 100%; margin: 12px 0; padding: 12px; font-size: 16px; }
    button { background: #0066ff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0055dd; }
    .note { color: #666; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Private Proxy (for you + 3 friends)</h1>
  <form method="POST">
    <input type="url" name="url" placeholder="https://example.com/article" required autofocus>
    <input type="password" name="secret" placeholder="Secret key" required>
    <button type="submit">Go →</button>
  </form>
  <p class="note">Only HTTPS URLs allowed. Secret is required.</p>
  <script src="./script.js"></script>
</body>
</html>
